<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>찬양 악보 매니저 🎵</title>
    
    <script src="config.js"></script>

    <link rel="icon" href="icon.png">
    <link rel="apple-touch-icon" href="icon.png"> 
    <meta name="theme-color" content="#0070f3"> 
    <link rel="manifest" href="manifest.json"> 

    <style>
        html { background-color: #e2e8f0; display: flex; justify-content: center; }
        body { 
            width: 100%; max-width: 600px; margin: 0; padding: 0; 
            font-family: -apple-system, sans-serif; background-color: #f5f5f5; 
            display: flex; flex-direction: column; height: 100vh; 
            box-shadow: 0 0 20px rgba(0,0,0,0.1); position: relative;
        }

        header { background-color: white; padding: 15px; text-align: center; font-weight: bold; font-size: 18px; position: sticky; top: 0; z-index: 10; border-bottom: 1px solid #ddd; }
        main { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 100px; }
        
        .title-input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; box-sizing: border-box; margin-bottom: 10px; font-weight: bold; color: #333; }
        
        textarea { width: 100%; height: 130px; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 16px; box-sizing: border-box; resize: none; }
        
        .top-btn-group { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .top-btn { flex: 1; min-width: 30%; padding: 12px 8px; color: white; border: none; border-radius: 8px; font-size: 13px; font-weight: bold; cursor: pointer; text-align: center; }
        
        .btn-show-list { background-color: #6c757d; }
        .btn-history { background-color: #8e44ad; }
        
        .btn-wakelock { background-color: #444; transition: background-color 0.3s; }
        .btn-wakelock.active { background-color: #f5a623; color: white; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        .btn-search { flex: 2; padding: 15px; background-color: #0070f3; color: white; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        .btn-reset { flex: 1; padding: 15px; background-color: #e0e0e0; color: #333; border: none; border-radius: 8px; font-size: 18px; font-weight: bold; cursor: pointer; }
        
        .result-area { margin-top: 30px; }
        .sheet-music-card { background: white; border-radius: 12px; padding: 15px; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); text-align: center; }
        .sheet-music-card img { width: 100%; height: auto; border-radius: 4px; min-height: 100px; background: #f0f0f0; }
        .sheet-title { margin-bottom: 10px; font-weight: bold; color: #333; text-align: left; }
        .error-msg { color: #ff4d4f; font-size: 14px; margin-top: 10px; font-weight: bold; }
        
        .bottom-bar { 
            position: fixed; bottom: 0; 
            left: 50%; transform: translateX(-50%); 
            width: 100%; max-width: 600px; box-sizing: border-box;
            background: white; padding: 15px; border-top: 1px solid #eee; 
            display: none; justify-content: center; gap: 8px; z-index: 20; 
        }
        
        .btn-download-normal { flex: 2; padding: 15px 5px; background-color: #17a2b8; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .btn-download-reverse { flex: 2; padding: 15px 5px; background-color: #28a745; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; }
        
        .btn-top { flex: 1; padding: 15px 5px; background-color: #34495e; color: white; border: none; border-radius: 10px; font-size: 15px; font-weight: bold; cursor: pointer; white-space: nowrap; }

        .modal-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6); z-index: 100; display: none;
            justify-content: center; align-items: center; padding: 20px; box-sizing: border-box;
        }
        .modal-content {
            background: white; width: 100%; max-height: 90%; border-radius: 12px;
            display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
        .modal-header {
            padding: 15px; background: #0070f3; color: white; display: flex; justify-content: space-between; align-items: center;
        }
        .modal-header.history { background: #8e44ad; } 
        .modal-header h3 { margin: 0; font-size: 18px; }
        .btn-close { background: none; border: none; color: white; font-size: 24px; cursor: pointer; }
        .modal-search { padding: 10px; border-bottom: 1px solid #ddd; background: #f9f9f9; }
        .modal-search input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 16px; box-sizing: border-box; }
        .modal-body { flex: 1; overflow-y: auto; padding: 0; margin: 0; list-style: none; }
        .song-item { padding: 15px; border-bottom: 1px solid #eee; cursor: pointer; font-size: 15px; color: #333; transition: background 0.2s; }
        .song-item:hover { background-color: #f0f8ff; }
        .song-item strong { color: #0070f3; margin-right: 8px; }
        
        .history-item { flex-direction: column; align-items: flex-start; }
        .history-title-badge { font-size: 15px; font-weight: bold; color: #8e44ad; margin-bottom: 5px; display: block; } 
        .history-date { font-size: 12px; color: #888; margin-bottom: 8px; }
        .history-text { font-size: 14px; white-space: pre-wrap; line-height: 1.4; padding-left: 5px; border-left: 3px solid #eee; color: #555; }
    </style>
</head>
<body>

    <header>이번 주 찬양 콘티 🎶</header>

    <main>
        <div style="background: white; padding: 20px; border-radius: 12px;">
            <div class="top-btn-group">
                <button class="top-btn btn-show-list" onclick="openSongModal()">📖 전체 곡</button>
                <button class="top-btn btn-history" onclick="openHistoryModal()">🕒 지난 콘티</button>
                <button id="btn-wakelock" class="top-btn btn-wakelock active" onclick="toggleWakeLock(true)">💡 화면: ON</button>
            </div>
            
            <input type="text" id="setlist-title" class="title-input" placeholder="콘티 제목 (예: 2026-03-15 수요예배)">
            
            <textarea id="song-input" placeholder="[아래 예시처럼 붙여넣어 주세요]&#13;&#10;&#13;&#10;276 햇살보다 밝게 빛나는 주의&#13;&#10;123 당신은 지금 어디로&#13;&#10;168 하나님은 너를 만드신 분"></textarea>
            
            <div class="btn-group">
                <button class="btn-reset" onclick="resetAll()">초기화 🔄</button>
                <button class="btn-search" onclick="startSearch()">악보 찾기 🔍</button>
            </div>
        </div>
        <div id="result-container" class="result-area"></div>
    </main>

    <div class="bottom-bar" id="download-bar">
        <button class="btn-download-normal" onclick="downloadAll(false)">순서대로<br>저장 ⬇️</button>
        <button class="btn-download-reverse" onclick="downloadAll(true)">역순으로<br>저장 ⬆️</button>
        <button class="btn-top" onclick="document.querySelector('main').scrollTo({top: 0, behavior: 'smooth'})">맨 위로<br>🚀</button>
    </div>

    <div class="modal-overlay" id="songModal">
        <div class="modal-content">
            <div class="modal-header">
                <h3>📖 전체 곡 리스트</h3>
                <button class="btn-close" onclick="closeSongModal()">&times;</button>
            </div>
            <div class="modal-search">
                <input type="text" id="searchInput" placeholder="검색어 또는 번호를 입력하세요..." onkeyup="filterSongs()">
            </div>
            <ul class="modal-body" id="songListContainer">
            </ul>
        </div>
    </div>

    <div class="modal-overlay" id="historyModal">
        <div class="modal-content">
            <div class="modal-header history">
                <h3>🕒 서버에서 불러오기</h3>
                <button class="btn-close" onclick="closeHistoryModal()">&times;</button>
            </div>
            <ul class="modal-body" id="historyListContainer">
            </ul>
        </div>
    </div>

    <script>
        // 1. Vercel 환경 변수가 있다면 그것을 쓰고, 없다면 config.js의 변수를 씁니다.
        // window.FIREBASE_URL은 Vercel 설정에서 넣어줄 예정입니다.
        const FINAL_FIREBASE_URL = window.FIREBASE_URL || (typeof FIREBASE_URL !== 'undefined' ? FIREBASE_URL : null);

        if (!FINAL_FIREBASE_URL) {
            console.warn("FIREBASE_URL이 설정되지 않았습니다.");
        }

        const EXTENSIONS = ['.jpg', '.png', '.gif', '.jfif', '.JPG', '.PNG', '.GIF', '.JFIF'];
        let foundImages = []; 
        let songArray = []; 
        let wakeLock = null;
        let isWakeLockEnabled = true; 

        // ---------------- 이력 관리 로직 ---------------- //

        async function saveToHistory() {
            if(!window.FIREBASE_URL) return; 

            const titleText = document.getElementById('setlist-title').value.trim() || "제목 없는 콘티";
            const inputText = document.getElementById('song-input').value.trim();
            if (!inputText || inputText.includes("아래 예시처럼 붙여넣어 주세요")) return;

            const now = new Date();
            const dateStr = `${now.getFullYear()}.${String(now.getMonth() + 1).padStart(2, '0')}.${String(now.getDate()).padStart(2, '0')} ${String(now.getHours()).padStart(2, '0')}:${String(now.getMinutes()).padStart(2, '0')}`;

            const payload = {
                date: dateStr,
                title: titleText,
                text: inputText,
                timestamp: Date.now()
            };

            try {
                await fetch(FIREBASE_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' }, 
                    body: JSON.stringify(payload)
                });
            } catch (error) {
                console.error("이력 저장 실패:", error);
            }
        }

        async function openHistoryModal() {
            if(!window.FIREBASE_URL) {
                alert("FIREBASE_URL이 설정되지 않았습니다.");
                return;
            }

            const container = document.getElementById('historyListContainer');
            container.innerHTML = "<li class='song-item' style='text-align:center;'>초고속 서버에서 이력을 불러오는 중입니다... ⚡</li>";
            document.getElementById('historyModal').style.display = 'flex';

            try {
                const response = await fetch(FIREBASE_URL);
                const data = await response.json();

                container.innerHTML = ""; 
                if (!data) {
                    container.innerHTML = "<li class='song-item' style='text-align:center; color:#999;'>서버에 저장된 콘티 이력이 없습니다.</li>";
                } else {
                    let historyArray = Object.values(data);
                    historyArray.sort((a, b) => b.timestamp - a.timestamp);
                    let topHistory = historyArray.slice(0, 20);

                    topHistory.forEach((item) => {
                        const li = document.createElement('li');
                        li.className = 'song-item history-item';
                        const displayTitle = item.title ? item.title : "제목 없음";
                        li.innerHTML = `
                            <div class="history-title-badge">📌 ${displayTitle}</div>
                            <div class="history-date">🕒 저장일시: ${item.date}</div>
                            <div class="history-text">${item.text}</div>
                        `;
                        li.onclick = () => {
                            document.getElementById('setlist-title').value = displayTitle !== "제목 없는 콘티" ? displayTitle : "";
                            document.getElementById('song-input').value = item.text;
                            document.getElementById('result-container').innerHTML = "";
                            document.getElementById('download-bar').style.display = 'none';
                            foundImages = [];
                            closeHistoryModal();
                            alert("✅ 서버에서 콘티를 불러왔습니다. '악보 찾기'를 눌러주세요!");
                        };
                        container.appendChild(li);
                    });
                }
            } catch (error) {
                container.innerHTML = "<li class='song-item' style='color:red; text-align:center;'>⚠️ 서버 통신 에러가 발생했습니다.</li>";
            }
        }

        function closeHistoryModal() {
            document.getElementById('historyModal').style.display = 'none';
        }

        // ---------------- 화면 꺼짐 방지 로직 ---------------- //

        async function initWakeLock() {
            if (!('wakeLock' in navigator)) return;
            try {
                wakeLock = await navigator.wakeLock.request('screen');
                isWakeLockEnabled = true;
                const btn = document.getElementById('btn-wakelock');
                btn.innerText = "💡 화면: ON";
                btn.classList.add('active');
            } catch (err) { }
        }

        function toggleWakeLock(manualToggle = false) {
            if (!('wakeLock' in navigator)) return;
            const btn = document.getElementById('btn-wakelock');
            if (manualToggle) isWakeLockEnabled = !isWakeLockEnabled;

            if (isWakeLockEnabled) {
                initWakeLock();
            } else {
                if (wakeLock !== null) {
                    wakeLock.release().then(() => {
                        wakeLock = null;
                        btn.innerText = "💡 화면: OFF";
                        btn.classList.remove('active');
                    });
                }
            }
        }

        document.addEventListener('click', () => { if (isWakeLockEnabled && wakeLock === null) initWakeLock(); }, { once: true });

        // ---------------- 전체 곡 리스트 로직 ---------------- //

        async function initSongList() {
            const container = document.getElementById('songListContainer');
            container.innerHTML = "<li class='song-item' style='text-align:center;'>목록을 불러오는 중입니다... ⏳</li>";
            try {
                const response = await fetch('hymn_list.txt');
                const text = await response.text();
                // [오타 수정] 텍스트 안의 태그만 제거하고 공백은 유지함
                const cleanText = text.replace(/\\s*/g, '');
                songArray = cleanText.split('\n').filter(line => line.trim() !== "");
                renderSongList(songArray);
            } catch (error) {
                container.innerHTML = "<li class='song-item' style='color:red; text-align:center;'>⚠️ hymn_list.txt 에러</li>";
            }
        }

        async function openSongModal() {
            document.getElementById('songModal').style.display = 'flex';
            document.getElementById('searchInput').value = "";
            if (songArray.length === 0) await initSongList();
            else renderSongList(songArray);
        }

        function closeSongModal() { document.getElementById('songModal').style.display = 'none'; }

        function filterSongs() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = songArray.filter(song => song.toLowerCase().includes(keyword));
            renderSongList(filtered);
        }

        function renderSongList(list) {
            const container = document.getElementById('songListContainer');
            container.innerHTML = ""; 
            if (list.length === 0) {
                container.innerHTML = "<li class='song-item' style='text-align:center; color:#999;'>검색 결과 없음</li>";
                return;
            }
            list.forEach(song => {
                const li = document.createElement('li');
                li.className = 'song-item';
                const match = song.match(/^(\d+)/);
                if(match) {
                    const num = match[1];
                    const title = song.substring(num.length).trim();
                    li.innerHTML = `<strong>${num}</strong> ${title}`;
                } else { li.textContent = song; }
                li.onclick = () => addSongToInput(song);
                container.appendChild(li);
            });
        }

        function addSongToInput(songLine) {
            const textarea = document.getElementById('song-input');
            let currentText = textarea.value;
            if (currentText.includes("아래 예시처럼 붙여넣어 주세요")) currentText = "";
            else if (currentText.trim() !== "") currentText += "\n"; 
            textarea.value = currentText + songLine;
            closeSongModal(); 
        }

        // ---------------- 악보 찾기 및 다운로드 ---------------- //

        function resetAll() {
            document.getElementById('setlist-title').value = ""; 
            document.getElementById('song-input').value = "";
            document.getElementById('result-container').innerHTML = "";
            document.getElementById('download-bar').style.display = 'none';
            foundImages = [];
        }

        function startSearch() {
            let rawText = document.getElementById('song-input').value;
            
            // [정규식 로직] 점 제거 및 3자리 포맷팅
            let cleanLines = rawText.split('\n').map(line => {
                let trimmed = line.trim();
                if (!trimmed) return "";
                let match = trimmed.match(/^(\d+)[\.\s]*(.*)/);
                if (match) {
                    let formattedNum = String(match[1]).padStart(3, '0');
                    let titleText = match[2].trim();
                    return `${formattedNum} ${titleText}`;
                }
                return trimmed;
            }).filter(line => line !== "");
            
            document.getElementById('song-input').value = cleanLines.join('\n');
            if (cleanLines.length === 0) return alert("곡 리스트를 입력해주세요!");

            const resultContainer = document.getElementById('result-container');
            const downloadBar = document.getElementById('download-bar');
            resultContainer.innerHTML = ""; 
            foundImages = []; 
            downloadBar.style.display = 'none'; 

            const today = new Date();
            const ampm = today.getHours() >= 12 ? 'PM' : 'AM'; 
            const dateStr = `${today.getFullYear()}${String(today.getMonth()+1).padStart(2,'0')}${String(today.getDate()).padStart(2,'0')}${ampm}`; 

            cleanLines.forEach((line, index) => {
                const match = line.match(/^(\d+)/); 
                if (match) {
                    const songNumber = match[1]; // 이미 위에서 3자리로 만든 값 사용
                    const songTitle = line.substring(songNumber.length).trim();
                    
                    const card = document.createElement('div');
                    card.className = 'sheet-music-card';
                    card.innerHTML = `<div class="sheet-title">${index + 1}. No.${songNumber} ${songTitle}</div>`;
                    
                    const imgTag = document.createElement('img');
                    imgTag.alt = `${songNumber} 악보 찾는 중...`;
                    card.appendChild(imgTag);
                    resultContainer.appendChild(card);

                    tryLoadImage(imgTag, songNumber, 0, (finalSrc) => {
                        const fileExt = finalSrc.substring(finalSrc.lastIndexOf('.'));
                        const fileName = `${dateStr}_${String(index + 1).padStart(2, '0')}_${songNumber}${fileExt}`;
                        foundImages[index] = { url: finalSrc, name: fileName };
                        if (foundImages.filter(x => x).length + document.querySelectorAll('.error-msg').length === cleanLines.length) {
                             if(foundImages.filter(x => x).length > 0) downloadBar.style.display = 'flex';
                        }
                    });
                }
            });
        }

        function tryLoadImage(imgElement, songNum, extIndex, onSuccess) {
            if (extIndex >= EXTENSIONS.length) {
                imgElement.style.display = 'none';
                imgElement.parentElement.innerHTML += `<p class="error-msg">❌ images/${songNum} 없음</p>`;
                return;
            }
            const currentExt = EXTENSIONS[extIndex];
            const trySrc = `images/${songNum}${currentExt}`;
            const tempImg = new Image();
            tempImg.onload = () => { imgElement.src = trySrc; onSuccess(trySrc); };
            tempImg.onerror = () => { tryLoadImage(imgElement, songNum, extIndex + 1, onSuccess); };
            tempImg.src = trySrc; 
        }

        function downloadAll(isReverse) {
            const validImages = foundImages.filter(img => img !== undefined);
            if (validImages.length === 0) return alert("저장할 악보가 없습니다.");
            
            const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent);
            if (isMobile && !isReverse) {
                if (!confirm("모바일은 역순 저장을 권장합니다. 진행할까요?")) return; 
            }

            saveToHistory();

            const targetImages = isReverse ? [...foundImages].reverse() : [...foundImages];
            let delayCount = 0;
            targetImages.forEach((imgInfo) => {
                if(!imgInfo) return; 
                setTimeout(() => {
                    fetch(imgInfo.url).then(r => r.blob()).then(blob => {
                        const blobUrl = window.URL.createObjectURL(blob);
                        const link = document.createElement('a');
                        link.href = blobUrl; link.download = imgInfo.name; 
                        document.body.appendChild(link); link.click();
                        document.body.removeChild(link);
                        window.URL.revokeObjectURL(blobUrl); 
                    }).catch(err => console.error(err));
                }, delayCount * 1000); 
                delayCount++;
            });
        }
    </script>
</body>
</html>
